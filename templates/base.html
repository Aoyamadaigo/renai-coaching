<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}Amour{% endblock %} — 恋愛パターン・ジャーナル</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',system-ui,sans-serif;background:#F5F0EB;color:#2A1F1F;min-height:100vh}
:root{
  --plum:#3D2A3E;--plum-mid:#5E3F60;
  --rose:#C4857A;--rose-warm:#D49B8E;--rose-pale:#F0D8D3;--rose-soft:#F7EEEB;
  --sage:#8FA99A;--sage-pale:#D5E3DC;
  --text:#2A1F1F;--muted:#8A7A78;--muted-lt:#B5A8A5;
  --border:#E3D8D0;--card:#FDFAF7;--bg:#F5F0EB;
}

/* ── Nav ── */
.nav{background:var(--plum);padding:15px 28px;display:flex;justify-content:space-between;align-items:center}
.nav-logo{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:300;color:#fff;letter-spacing:.08em;display:flex;align-items:center;gap:10px;text-decoration:none}
.nav-right{display:flex;gap:16px;align-items:center}
.nav-user{font-size:12px;color:rgba(255,255,255,.4)}
.nav-link{font-size:12px;color:rgba(255,255,255,.45);background:none;border:none;cursor:pointer;text-decoration:none;padding:4px 0}
.nav-link:hover{color:rgba(255,255,255,.75)}
.nav-badge{font-size:10px;padding:3px 10px;border-radius:20px;background:rgba(196,133,122,.25);color:var(--rose-warm);letter-spacing:.08em}

/* ── Step nav ── */
.step-nav{background:#fff;border-bottom:1px solid var(--border);padding:0 20px;display:flex;align-items:center;height:56px;gap:12px;position:sticky;top:0;z-index:20}
.step-nav-back{font-size:13px;color:var(--muted);background:none;border:none;cursor:pointer;text-decoration:none;white-space:nowrap}
.step-nav-steps{flex:1;display:flex;justify-content:center;gap:4px}
.step-btn{font-size:12px;color:var(--muted-lt);background:none;border:none;padding:6px 14px;border-radius:20px;cursor:pointer;letter-spacing:.04em;text-decoration:none;transition:all .2s}
.step-btn.active{font-weight:600;color:var(--plum);background:var(--rose-pale)}
.step-btn:hover:not(.active){color:var(--plum)}
.step-save{font-size:11px;color:var(--muted-lt);white-space:nowrap;min-width:72px;text-align:right}

/* ── Progress bar ── */
.progress-bar{height:3px;background:var(--border)}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--rose),var(--rose-warm));transition:width .4s ease}

/* ── Layout ── */
.container{max-width:680px;margin:0 auto;padding:44px 20px 60px}
.container-lg{max-width:900px;margin:0 auto;padding:44px 20px 60px}
.work-wrap{max-width:740px;margin:0 auto;padding:36px 20px 80px}

/* ── Step header ── */
.step-header{margin-bottom:32px}
.step-header-row{display:flex;align-items:baseline;gap:14px;margin-bottom:8px}
.step-num{font-family:'Cormorant Garamond',serif;font-size:48px;font-weight:300;color:var(--rose-pale);line-height:1}
.step-title{font-family:'Cormorant Garamond',serif;font-size:30px;font-weight:400;color:var(--plum);letter-spacing:.02em;line-height:1.2}
.step-sub{font-size:13px;color:var(--muted);line-height:1.85}
.step-divider{width:44px;height:2px;background:linear-gradient(90deg,var(--rose),transparent);margin-top:16px}

/* ── Cards ── */
.card{background:var(--card);border-radius:18px;padding:22px 24px 18px;border:1px solid var(--border)}
.card+.card{margin-top:14px}
.card-white{background:#fff;border-radius:24px;padding:40px 36px;box-shadow:0 8px 40px rgba(61,42,62,.09)}
.card-plum{background:linear-gradient(135deg,var(--plum) 0%,var(--plum-mid) 100%);border-radius:22px;padding:34px 36px;cursor:pointer;position:relative;overflow:hidden;box-shadow:0 8px 28px rgba(61,42,62,.22)}
.card-plum-circle1{position:absolute;right:-30px;top:-30px;width:140px;height:140px;border-radius:50%;background:rgba(255,255,255,.04)}
.card-plum-circle2{position:absolute;right:28px;bottom:-24px;width:90px;height:90px;border-radius:50%;background:rgba(196,133,122,.15)}

/* ── Forms ── */
label{font-size:11px;font-weight:500;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);display:block;margin-bottom:6px}
input[type=text],input[type=email],input[type=password],textarea,select{width:100%;padding:12px 14px;border-radius:10px;border:1.5px solid var(--border);background:#fff;font-family:'DM Sans',sans-serif;font-size:14px;color:var(--text);outline:none;transition:border-color .2s}
input:focus,textarea:focus,select:focus{border-color:var(--rose)}
textarea{line-height:1.75;resize:vertical}
.field{margin-bottom:16px}
.field-grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}

/* ── Buttons ── */
.btn{display:inline-block;padding:11px 26px;border-radius:30px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;letter-spacing:.04em;border:none;text-decoration:none;transition:opacity .15s}
.btn:hover{opacity:.82}
.btn-primary{background:var(--plum);color:#fff}
.btn-rose{background:var(--rose);color:#fff}
.btn-secondary{background:transparent;color:var(--plum);border:1.5px solid var(--plum)}
.btn-ghost{background:var(--rose-pale);color:var(--rose)}
.btn-sm{padding:7px 16px;font-size:12px}
.btn-danger{background:transparent;color:var(--muted-lt);border:1px solid var(--border);font-size:12px;padding:6px 12px}
.btn-full{width:100%;padding:14px;border-radius:14px;font-size:14px}

/* ── Flash ── */
.flash{padding:12px 16px;border-radius:10px;font-size:13px;margin-bottom:16px;line-height:1.6}
.flash-error{background:var(--rose-soft);color:var(--rose);border-left:3px solid var(--rose)}
.flash-success{background:var(--sage-pale);color:var(--sage);border-left:3px solid var(--sage)}

/* ── Session list ── */
.session-item{background:var(--card);border-radius:16px;padding:18px 22px;display:flex;justify-content:space-between;align-items:center;border:1px solid var(--border);text-decoration:none;color:inherit;transition:box-shadow .2s;margin-bottom:10px;cursor:pointer}
.session-item:hover{box-shadow:0 4px 20px rgba(61,42,62,.07)}
.badge{font-size:11px;padding:4px 12px;border-radius:20px}
.badge-done{background:var(--sage-pale);color:var(--sage)}
.badge-wip{background:var(--rose-pale);color:var(--rose)}
.badge-coach{background:rgba(61,42,62,.08);color:var(--plum);font-size:10px;letter-spacing:.08em}

/* ── Work nav bottom ── */
.work-nav{display:flex;justify-content:space-between;align-items:center;margin-top:48px;padding-top:32px;border-top:1px solid var(--border)}

/* ── Tabs ── */
.tabs{display:flex;gap:8px;margin-bottom:28px}
.tab{flex:1;padding:12px 8px;border-radius:12px;font-family:'DM Sans',sans-serif;font-size:13px;background:transparent;border:1.5px solid var(--border);color:var(--plum);cursor:pointer;transition:all .2s;text-align:center;text-decoration:none}
.tab.active{background:var(--plum);color:#fff;border-color:var(--plum);font-weight:600}

/* ── Event card (step1) ── */
.event-card{background:var(--card);border-radius:18px;padding:22px 22px 44px;border:1px solid var(--border);position:relative;margin-bottom:14px}
.event-num{position:absolute;top:14px;right:18px;font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:300;color:var(--rose-pale);line-height:1}
.event-del{position:absolute;bottom:14px;right:16px;font-size:11px;color:var(--muted-lt);background:none;border:none;cursor:pointer;padding:4px 8px}

/* ── Hints ── */
.hint{background:var(--rose-soft);border-left:3px solid var(--rose);border-radius:0 10px 10px 0;padding:14px 18px;margin-bottom:28px;font-size:13px;color:var(--rose);line-height:1.75}

/* ── Quote ── */
.quote{background:linear-gradient(135deg,rgba(61,42,62,.04),rgba(196,133,122,.09));border-radius:18px;padding:28px 30px;margin-bottom:36px;border:1px solid var(--border);font-family:'Cormorant Garamond',serif;font-size:19px;font-style:italic;color:var(--plum);line-height:1.9}

/* ── Answer blocks (view / coach) ── */
.answer-block{margin-bottom:20px}
.answer-label{font-size:10px;font-weight:500;letter-spacing:.14em;text-transform:uppercase;color:var(--muted-lt);margin-bottom:5px}
.answer-text{font-size:14px;color:var(--text);line-height:1.8;white-space:pre-wrap}
.answer-empty{font-size:13px;color:var(--muted-lt);font-style:italic}

/* ── Coach note ── */
.note-card{background:#fff;border-radius:12px;padding:16px 18px;border:1px solid var(--border);margin-bottom:10px}
.note-meta{font-size:11px;color:var(--muted-lt);margin-bottom:6px}
.note-text{font-size:13px;color:var(--text);line-height:1.75;white-space:pre-wrap}

/* ── Coach table ── */
table{width:100%;border-collapse:collapse}
th{font-size:11px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);text-align:left;padding:10px 14px;border-bottom:1px solid var(--border)}
td{padding:14px;border-bottom:1px solid var(--border);font-size:14px}
tr:last-child td{border-bottom:none}
.table-row:hover td{background:var(--rose-soft)}
.table-link{text-decoration:none;color:inherit}

/* ── Section title ── */
.section-label{font-size:11px;font-weight:500;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:14px}

/* ── Divider ── */
hr.divider{border:none;border-top:1px solid var(--border);margin:28px 0}

/* ── SVG flower ── */
.flower{display:block}

@media(max-width:600px){
  .field-grid2{grid-template-columns:1fr}
  .tabs{flex-direction:column}
}
</style>
</head>
<body>
{% block body %}{% endblock %}
</body>
</html>
